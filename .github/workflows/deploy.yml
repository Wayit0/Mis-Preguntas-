# ===========================================================================
# Deploy de "Mis Preguntas" (Next.js, carpeta web/) a Azure App Service.
#
# Build standalone de Next 16 + deploy vía PUBLISH PROFILE.
#
# SECRET requerido (Settings -> Secrets and variables -> Actions -> Secrets):
#   AZURE_WEBAPP_PUBLISH_PROFILE   perfil de publicación del App Service
#     az webapp deployment list-publishing-profiles -g rg-mispreguntas-prod \
#       -n app-mispreguntas-ecupwarmwaeb6 --xml
#
# Notas de build (aprendidas en el despliegue inicial):
#   - next.config usa output:'standalone'; hay que copiar .next/static, public y
#     el binario nativo de sharp (node_modules/@img) dentro de .next/standalone.
#   - El runner ubuntu-latest es linux-x64, así que sharp trae el binario correcto
#     de forma nativa (sin emulación).
#   - SCM_DO_BUILD_DURING_DEPLOYMENT=false en la Web App (no build de Oryx) y el
#     startup command 'HOSTNAME=0.0.0.0 node server.js' ya están configurados.
# ===========================================================================
name: Deploy a Azure App Service

on:
  push:
    branches:
      - feature/nextjs-azure-rewrite
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: app-mispreguntas-ecupwarmwaeb6

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lee la versión de pnpm desde el campo packageManager de package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build (standalone)
        run: pnpm build
        env:
          # Placeholders SÓLO para el build: algunos módulos leen process.env al
          # importarse (cliente postgres, better-auth). En runtime App Service
          # inyecta los valores reales vía Key Vault references.
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: build-time-placeholder-not-a-real-secret-000000000000
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: '1'
          NODE_ENV: production

      - name: Ensamblar bundle standalone
        run: |
          set -e
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          # sharp: incluir el binario nativo (@img) que el tracer de Next no copia
          rm -rf .next/standalone/node_modules/@img
          cp -r node_modules/@img .next/standalone/node_modules/@img
          test -f .next/standalone/server.js
          test -d .next/standalone/node_modules/@img

      - name: Deploy a Azure Web App (publish profile)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: web/.next/standalone
