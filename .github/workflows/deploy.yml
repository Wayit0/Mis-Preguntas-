# ===========================================================================
# Deploy de "Mis Preguntas" (Next.js, carpeta web/) a Azure App Service.
#
# Build con pnpm + deploy vía OIDC (federated credentials): sin secretos de
# cliente de larga vida; GitHub obtiene un token de Azure AD por ejecución.
#
# ---------------------------------------------------------------------------
# SECRETS requeridos (Settings -> Secrets and variables -> Actions -> Secrets):
#   AZURE_CLIENT_ID         appId de la App Registration (federated credential)
#   AZURE_TENANT_ID         tenant de Azure AD (disso.ai)
#   AZURE_SUBSCRIPTION_ID   suscripción "Patrocinio de Microsoft Azure"
#
# VARIABLES requeridas (Settings -> Secrets and variables -> Actions -> Variables):
#   AZURE_WEBAPP_NAME       nombre de la Web App (output `appHostName` del Bicep,
#                           sin el sufijo .azurewebsites.net). P. ej.
#                           app-mispreguntas-<uniqueSuffix>.
#
# ---------------------------------------------------------------------------
# Setup ÚNICO en Azure (se hace en Fase 8B; aquí sólo se documenta). Con `az`
# autenticado y la suscripción seleccionada:
#
#   # 1) App Registration + service principal
#   APP_ID=$(az ad app create --display-name "github-mispreguntas-deploy" \
#     --query appId -o tsv)
#   az ad sp create --id "$APP_ID"
#
#   # 2) Federated credential para este repo/rama (OIDC, sin secreto)
#   az ad app federated-credential create --id "$APP_ID" --parameters '{
#     "name": "github-nextjs-azure-rewrite",
#     "issuer": "https://token.actions.githubusercontent.com",
#     "subject": "repo:<OWNER>/<REPO>:ref:refs/heads/feature/nextjs-azure-rewrite",
#     "audiences": ["api://AzureADTokenExchange"]
#   }'
#   # Para deploys desde un Environment de GitHub, el subject sería
#   #   "repo:<OWNER>/<REPO>:environment:<NOMBRE_ENV>"
#
#   # 3) Permiso para desplegar a la Web App (alcance acotado al RG)
#   SP_OBJ=$(az ad sp show --id "$APP_ID" --query id -o tsv)
#   az role assignment create --assignee-object-id "$SP_OBJ" \
#     --assignee-principal-type ServicePrincipal \
#     --role "Website Contributor" \
#     --scope "/subscriptions/<SUB_ID>/resourceGroups/rg-mispreguntas-prod"
#
# Luego registrar en GitHub: AZURE_CLIENT_ID=$APP_ID, AZURE_TENANT_ID=$(az account
# show --query tenantId -o tsv), AZURE_SUBSCRIPTION_ID=<SUB_ID> y la variable
# AZURE_WEBAPP_NAME.
# ===========================================================================
name: Deploy a Azure App Service

on:
  push:
    branches:
      - feature/nextjs-azure-rewrite
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# OIDC: 'id-token: write' permite a azure/login pedir el token federado.
permissions:
  id-token: write
  contents: read

# Evita despliegues solapados sobre la misma Web App.
concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Placeholders SÓLO para el build: algunos módulos leen process.env al
          # importarse (cliente postgres, better-auth). En runtime, App Service
          # inyecta los valores reales vía Key Vault references. Las páginas que
          # consultan la BD deben ser dinámicas (no se prerenderan en build).
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: build-time-placeholder-not-a-real-secret-000000000000
          BETTER_AUTH_URL: http://localhost:3000
          NODE_ENV: production

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy a Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          # Se despliega la carpeta web/ ya construida. App Service arranca con
          # `npm run start` (next start) según el Bicep (infra/appservice.bicep).
          # Si se prefiere build en el servidor, poner
          # SCM_DO_BUILD_DURING_DEPLOYMENT=true en la Web App; alternativa de
          # empaquetado más liviano: output 'standalone' de Next 16 + startup
          # 'node server.js' (ver infra/deploy.sh).
          package: web
